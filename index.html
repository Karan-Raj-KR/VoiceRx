<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceRx</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 28px 36px;
    }

    .wordmark {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .wordmark span {
      display: block;
      font-size: 0.72rem;
      font-weight: 400;
      color: #555;
      margin-top: 2px;
      letter-spacing: 0;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    /* Outer pulse rings */
    .btn-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 200px;
      height: 200px;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(124, 58, 237, 0.3);
      opacity: 0;
    }

    .btn-wrap.active .ring-1 {
      animation: ripple 2s ease-out infinite;
    }
    .btn-wrap.active .ring-2 {
      animation: ripple 2s ease-out 0.6s infinite;
    }
    .btn-wrap.active .ring-3 {
      animation: ripple 2s ease-out 1.2s infinite;
    }

    @keyframes ripple {
      0%   { transform: scale(1);    opacity: 0.5; }
      100% { transform: scale(1.7);  opacity: 0; }
    }

    /* Main circle button */
    #call-btn {
      position: relative;
      z-index: 1;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #111;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      outline: none;
      letter-spacing: 0.1px;
    }

    #call-btn:hover {
      border-color: rgba(124, 58, 237, 0.5);
      box-shadow: 0 0 32px rgba(124, 58, 237, 0.15);
    }

    #call-btn.active {
      background: #052e16;
      border-color: #16a34a;
      box-shadow: 0 0 40px rgba(22, 163, 74, 0.2);
    }

    #call-btn.active:hover {
      box-shadow: 0 0 48px rgba(22, 163, 74, 0.3);
    }

    .btn-icon {
      width: 28px;
      height: 28px;
      opacity: 0.85;
    }

    /* Status */
    #status {
      font-size: 0.78rem;
      color: #444;
      letter-spacing: 0.2px;
      min-height: 18px;
      text-align: center;
    }

    /* ── Footer ── */
    footer {
      padding: 28px;
      text-align: center;
      font-size: 0.7rem;
      color: #333;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header>
    <div class="wordmark">
      VoiceRx
      <span>AI Health Assistant</span>
    </div>
  </header>

  <main>
    <div class="btn-wrap" id="btn-wrap">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>

      <button id="call-btn" onclick="toggleCall()">
        <!-- Mic icon (idle) -->
        <svg id="icon-mic" class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8"  y1="22" x2="16" y2="22"/>
        </svg>
        <!-- Stop icon (active) -->
        <svg id="icon-stop" class="btn-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
        <span id="btn-text">Talk to VoiceRx</span>
      </button>
    </div>

    <div id="status"></div>
  </main>

  <footer>
    For informational purposes only. Not a substitute for professional medical advice.
  </footer>

  <script>
    var vapiInstance = null;
    var inCall = false;

    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.js';
    script.onload = function () {
      vapiInstance = new Vapi('8f6ec153-8e27-4bb3-84fd-7a004ecf5946');

      vapiInstance.on('call-start', function () {
        setStatus('Listening…');
        setActive(true);
      });

      vapiInstance.on('call-end', function () {
        setStatus('Call ended');
        setActive(false);
        setTimeout(function () { setStatus(''); }, 3000);
      });

      vapiInstance.on('error', function (e) {
        console.error(e);
        setStatus('Something went wrong. Please try again.');
        setActive(false);
      });
    };
    document.head.appendChild(script);

    function toggleCall() {
      if (!vapiInstance) { setStatus('Loading…'); return; }
      if (!inCall) {
        setStatus('Connecting…');
        vapiInstance.start('49ab265f-6a73-4956-9f47-7a31e9963bf4');
      } else {
        vapiInstance.stop();
      }
    }

    function setActive(active) {
      inCall = active;
      var btn    = document.getElementById('call-btn');
      var wrap   = document.getElementById('btn-wrap');
      var mic    = document.getElementById('icon-mic');
      var stop   = document.getElementById('icon-stop');

      btn.classList.toggle('active', active);
      wrap.classList.toggle('active', active);
      mic.style.display  = active ? 'none'         : 'block';
      stop.style.display = active ? 'block'        : 'none';
      document.getElementById('btn-text').textContent = active ? 'End Call' : 'Talk to VoiceRx';
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
