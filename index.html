<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceRx — AI Voice Health Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 2rem; font-weight: 700; color: #58a6ff; margin-bottom: 8px; }
    .tagline { color: #8b949e; font-size: 0.95rem; margin-bottom: 36px; }
    #call-btn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    #call-btn:hover { background: #2ea043; }
    #call-btn.active { background: #da3633; }
    #status { margin-top: 20px; font-size: 0.875rem; color: #8b949e; min-height: 20px; }
    .disclaimer { font-size: 0.75rem; color: #6e7681; max-width: 480px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🩺 VoiceRx</div>
    <div class="tagline">AI-powered voice health assistant</div>
    <button id="call-btn">Start Voice Call</button>
    <div id="status">Ready to connect</div>
  </div>
  <p class="disclaimer">⚠️ Demo only. Not medical advice.</p>

  <script type="module">
    import Vapi from "https://esm.sh/@vapi-ai/web";

    const PUBLIC_KEY   = "8f6ec153-8e27-4bb3-84fd-7a004ecf5946";
    const ASSISTANT_ID = "49ab265f-6a73-4956-9f47-7a31e9963bf4";

    let inCall = false;
    let vapi   = null;

    const btn    = document.getElementById("call-btn");
    const status = document.getElementById("status");

    function setStatus(text) { status.textContent = text; }
    function setBtn(label, active = false) {
      btn.textContent = label;
      active ? btn.classList.add("active") : btn.classList.remove("active");
    }

    async function startCall() {
      try {
        setStatus("Connecting...");
        setBtn("Connecting...");

        vapi = new Vapi(PUBLIC_KEY);

        vapi.on("call-start", () => {
          inCall = true;
          setStatus("Call active — speak your question");
          setBtn("End Call", true);
        });

        vapi.on("call-end", () => {
          inCall = false;
          vapi = null;
          setStatus("Call ended");
          setBtn("Start Voice Call", false);
        });

        vapi.on("error", (e) => {
          inCall = false;
          vapi = null;
          setStatus("Error: " + (e?.message || "unknown"));
          setBtn("Start Voice Call", false);
          console.error(e);
        });

        await vapi.start(ASSISTANT_ID);
      } catch (err) {
        inCall = false;
        vapi = null;
        setStatus("Failed to connect.");
        setBtn("Start Voice Call", false);
        console.error(err);
      }
    }

    function stopCall() {
      if (vapi) vapi.stop();
    }

    btn.addEventListener("click", () => {
      if (!inCall) startCall(); else stopCall();
    });
  </script>
</body>
</html>
