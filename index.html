<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceRx — AI Voice Health Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo { font-size: 2rem; font-weight: 700; color: #58a6ff; margin-bottom: 8px; }
    .tagline { color: #8b949e; font-size: 0.95rem; margin-bottom: 36px; }
    #call-btn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    #call-btn:hover { background: #2ea043; }
    #call-btn.active { background: #da3633; }
    #call-btn.active:hover { background: #f85149; }
    #status { margin-top: 20px; font-size: 0.875rem; color: #8b949e; min-height: 20px; }
    .pulse {
      display: inline-block; width: 8px; height: 8px;
      background: #3fb950; border-radius: 50%; margin-right: 6px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .disclaimer { font-size: 0.75rem; color: #6e7681; max-width: 480px; text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🩺 VoiceRx</div>
    <div class="tagline">AI-powered voice health assistant — ask your health questions out loud</div>
    <button id="call-btn" onclick="toggleCall()">Start Voice Call</button>
    <div id="status">Ready to connect</div>
  </div>
  <p class="disclaimer">⚠️ VoiceRx is a demo tool and does not provide medical advice. Always consult a qualified healthcare professional.</p>

  <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.umd.js"></script>
  <script>
    let inCall = false;
    let vapi = null;

    const PUBLIC_KEY = "8f6ec153-8e27-4bb3-84fd-7a004ecf5946";
    const ASSISTANT_ID = "49ab265f-6a73-4956-9f47-7a31e9963bf4";

    function setStatus(text, pulse = false) {
      document.getElementById("status").innerHTML = pulse
        ? '<span class="pulse"></span>' + text : text;
    }

    function setBtn(label, active = false) {
      const btn = document.getElementById("call-btn");
      btn.textContent = label;
      active ? btn.classList.add("active") : btn.classList.remove("active");
    }

    async function toggleCall() {
      if (!inCall) {
        await startCall();
      } else {
        stopCall();
      }
    }

    async function startCall() {
      try {
        setStatus("Connecting...");
        setBtn("Connecting...");

        vapi = new window.Vapi(PUBLIC_KEY);

        vapi.on("call-start", () => {
          inCall = true;
          setStatus("Call active — speak your question", true);
          setBtn("End Call", true);
        });

        vapi.on("call-end", () => {
          inCall = false;
          vapi = null;
          setStatus("Call ended");
          setBtn("Start Voice Call", false);
        });

        vapi.on("error", (e) => {
          inCall = false;
          vapi = null;
          setStatus("Error: " + (e?.message || "Unknown"));
          setBtn("Start Voice Call", false);
          console.error(e);
        });

        await vapi.start(ASSISTANT_ID);
      } catch (err) {
        inCall = false;
        vapi = null;
        setStatus("Failed to connect.");
        setBtn("Start Voice Call", false);
        console.error(err);
      }
    }

    function stopCall() {
      if (vapi) vapi.stop();
    }
  </script>
</body>
</html>
